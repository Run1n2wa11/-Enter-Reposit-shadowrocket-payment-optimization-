[General]
loglevel = notify
dns-server = 119.29.29.29,223.5.5.5,8.8.8.8,1.1.1.1
port = 1087
socks-port = 1088
redir-port = 9420

[Proxy]
Stripe-CA = http, stripe.com, 443, username=payment, password=ca-optimized, obfs=tls, obfs-host=stripe.com
PayPal-CA = http, paypal-processing.com, 443, username=payment, password=ca-optimized, obfs=tls
Square-CA = http, square-payment.com, 443, username=payment, password=ca-optimized, obfs=tls
Authorize-CA = http, authorize-payment.com, 443, username=payment, password=ca-optimized, obfs=tls
Worldpay-CA = http, worldpay-api.com, 443, username=payment, password=ca-optimized, obfs=tls
Adyen-CA = http, adyen-checkout.com, 443, username=payment, password=ca-optimized, obfs=tls

Stripe-TX = http, stripe.com, 443, username=payment, password=tx-optimized, obfs=tls, obfs-host=stripe.com
PayPal-TX = http, paypal-processing.com, 443, username=payment, password=tx-optimized, obfs=tls
Square-TX = http, square-payment.com, 443, username=payment, password=tx-optimized, obfs=tls
Authorize-TX = http, authorize-payment.com, 443, username=payment, password=tx-optimized, obfs=tls

Stripe-FL = http, stripe.com, 443, username=payment, password=fl-optimized, obfs=tls, obfs-host=stripe.com
PayPal-FL = http, paypal-processing.com, 443, username=payment, password=fl-optimized, obfs=tls
Square-FL = http, square-payment.com, 443, username=payment, password=fl-optimized, obfs=tls

Stripe-NY = http, stripe.com, 443, username=payment, password=ny-optimized, obfs=tls, obfs-host=stripe.com
PayPal-NY = http, paypal-processing.com, 443, username=payment, password=ny-optimized, obfs=tls
Square-NY = http, square-payment.com, 443, username=payment, password=ny-optimized, obfs=tls

[Rule]
# Stripe payment processing
domain-suffix,stripe.com,Stripe-CA
domain-suffix,stripe-processing.com,Stripe-CA
domain-suffix,stripe.network,Stripe-CA

# PayPal & Braintree
domain-suffix,paypal.com,PayPal-CA
domain-suffix,braintreegateway.com,PayPal-CA
domain-suffix,paypal-api.com,PayPal-CA

# Square payment
domain-suffix,squareup.com,Square-CA
domain-suffix,square-api.com,Square-CA

# Authorize.net
domain-suffix,authorize.net,Authorize-CA
domain-suffix,authorizenet.com,Authorize-CA

# 2Checkout/Verifone
domain-suffix,2checkout.com,Authorize-CA
domain-suffix,verifone-api.com,Authorize-CA

# Worldpay
domain-suffix,worldpay.com,Worldpay-CA
domain-suffix,worldpay-api.com,Worldpay-CA

# Adyen
domain-suffix,adyen.com,Adyen-CA
domain-suffix,adyenpayments.com,Adyen-CA

# Apple Pay routing
domain-suffix,apple.com,Stripe-CA
domain-suffix,applewebdata.com,Stripe-CA

# Google Pay routing
domain-suffix,google.com,PayPal-CA
domain-suffix,googleapis.com,PayPal-CA

# Klarna
domain-suffix,klarna.com,PayPal-CA
domain-suffix,klarna-api.com,PayPal-CA

# Affirm
domain-suffix,affirm.com,Square-CA
domain-suffix,affirm-api.com,Square-CA

# Afterpay
domain-suffix,afterpay.com,Square-CA
domain-suffix,afterpay-api.com,Square-CA

# E-commerce platforms
domain-suffix,shopify.com,Stripe-CA
domain-suffix,shopifycdn.com,Stripe-CA
domain-suffix,woocommerce.com,PayPal-CA

# DNS over HTTPS for privacy
domain-suffix,dns.google,DIRECT
domain-suffix,cloudflare-dns.com,DIRECT

# Localhost bypass
domain-suffix,localhost,DIRECT
domain,127.0.0.1,DIRECT
domain,0.0.0.0,DIRECT

# Default rule
final,DIRECT

[Host]
# Payment processor IPs (US-based)
stripe.com = 104.16.0.0/12
paypal.com = 103.70.0.0/16
square-api.com = 174.36.0.0/16
authorize.net = 204.13.0.0/16
worldpay.com = 195.66.0.0/16
adyen.com = 195.154.0.0/16